version: '3.9'
services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: automotive_cs03
      MYSQL_USER: cs03_user
      MYSQL_PASSWORD: cs03_pass
    ports: ["3306:3306"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    environment:
      MYSQL_HOST: mysql    # Override .env host for Docker network
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    depends_on: [mysql]

  frontend:
    build: ./frontend
    ports: ["4200:80"]
    depends_on: [backend]

volumes:
  mysql_data:
  chroma_data: