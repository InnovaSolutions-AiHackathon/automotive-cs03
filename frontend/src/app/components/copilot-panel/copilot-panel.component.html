<div class="copilot-wrapper">
  <div class="copilot-panel">

    <!-- HEADER -->
    <div class="copilot-header">
      <div class="bot-avatar">🤖</div>
      <div class="title">CS Copilot — AI Agent</div>
    </div>

    <!-- CHAT AREA -->
    <div class="copilot-messages">

      @for (m of messages; track $index) {
        <div class="message" [ngClass]="m.role">

          <div class="avatar">{{ m.role === 'agent' ? '🤖' : '🧑' }}</div>

          <div class="bubble">
            {{ m.content }}

            <!-- Vehicle selection list -->
            @if (m.vehicles?.length) {
              <div class="vehicle-list">
                @for (v of m.vehicles!; track v.vehicle_code) {
                  <button class="vehicle-btn"
                          [class.selected]="vehicleId === v.vehicle_code"
                          (click)="selectVehicle(v)">
                    <div class="make">{{ v.make }}</div>
                    <div class="model">{{ v.model }} • {{ v.year }}</div>
                  </button>
                }
              </div>
            }
          </div>

        </div>
      }

      <!-- Typing indicator -->
      @if (loading) {
        <div class="thinking">
          <span></span><span></span><span></span>
        </div>
      }

    </div>

    <!-- INPUT BAR -->
    <div class="copilot-input">

      <!-- Image upload -->
      <label class="upload" title="Attach dashboard image">
        📷
        <input type="file" hidden accept="image/*" (change)="onImageSelected($event)" />
      </label>

      <input [(ngModel)]="inputText"
             (keydown)="onEnter($event)"
             placeholder="Describe the issue or ask a question…"
             [disabled]="waitingForVehicle" />

      <button (click)="send()" [disabled]="loading || waitingForVehicle">Send</button>

    </div>

  </div>
</div>
