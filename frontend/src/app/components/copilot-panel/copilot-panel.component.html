<div class="copilot-wrapper">

  <div class="copilot-panel">

    <!-- HEADER -->
    <div class="copilot-header">
      <div class="bot-avatar">🤖</div>
      <div class="title">CCA Copilot — Vehicle</div>
    </div>

    <!-- CHAT AREA -->
    <div class="copilot-messages">

      <div
        *ngFor="let m of messages"
        class="message"
        [ngClass]="m.role"
      >

        <!-- AVATAR -->
        <div class="avatar">
          {{ m.role === 'agent' ? '🤖' : '🧑' }}
        </div>

        <!-- MESSAGE -->
        <div class="bubble">

          {{ m.content }}

          <!-- 🚗 VEHICLE LIST -->
          <div *ngIf="m.vehicles?.length" class="vehicle-list">
            <button
              *ngFor="let v of m.vehicles"
              (click)="selectVehicle(v)"
              class="vehicle-btn"
              [class.selected]="vehicleId === v.vehicle_code"
            >
              <div class="make">{{ v.make }}</div>
              <div class="model">{{ v.model }} • {{ v.year }}</div>
            </button>
          </div>

          <!-- TOOLS -->
          <div *ngIf="m.tools?.length" class="tools">
            🔧 {{ m.tools | json }}
          </div>

        </div>

      </div>

      <!-- THINKING -->
      <div *ngIf="loading" class="thinking">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

    <!-- INPUT BAR -->
    <div class="copilot-input">

      <!-- IMAGE -->
      <label class="upload">
        🔗
        <input
          type="file"
          hidden
          accept="image/*"
          (change)="onImageSelected($event)"
        />
      </label>

      <!-- INPUT -->
      <input
        [(ngModel)]="inputText"
        (keydown)="onEnter($event)"
        placeholder="Describe your issue ..."
        [disabled]="waitingForVehicle"
      />

      <!-- SEND -->
      <button
        (click)="send()"
        [disabled]="loading || waitingForVehicle"
      >
        Send
      </button>

    </div>

  </div>

</div>
