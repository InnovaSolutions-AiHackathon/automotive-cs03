<div class="copilot-wrapper">

  <div class="copilot-panel">

    <!-- HEADER -->
    <div class="copilot-header">

      <div class="bot-avatar">
        🤖
      </div>

      <div class="title">
        AI Copilot — Vehicle {{vehicleId}}
      </div>

    </div>

    <!-- CHAT AREA -->
    <div class="copilot-messages">

      <div
        *ngFor="let m of messages"
        class="message"
        [ngClass]="m.role"
      >

        <!-- AVATAR -->
        <div class="avatar">
          {{ m.role === 'agent' ? '🤖' : '🧑' }}
        </div>

        <!-- MESSAGE -->
        <div class="bubble">

          {{m.content}}

          <div *ngIf="m.tools?.length" class="tools">
            🔧 {{m.tools | json}}
          </div>

        </div>

      </div>

      <!-- THINKING -->
      <div *ngIf="loading" class="thinking">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

    <!-- INPUT BAR -->
    <div class="copilot-input">

      <!-- IMAGE UPLOAD -->
      <label class="upload">

        🔗

        <input
          type="file"
          hidden
          accept="image/*"
          (change)="onImageSelected($event)"
        />

      </label>

      <!-- TEXT INPUT -->
      <input
        [(ngModel)]="inputText"
        (keydown)="onEnter($event)"
        placeholder="Describe your issue ..."
      />

      <!-- SEND BUTTON -->
      <button
        (click)="send()"
        [disabled]="loading"
      >
        Send
      </button>

    </div>

  </div>

</div>
